                <meta http-equiv="content-language" content="es-AR" />  <title>404</title>

  <link rel="preconnect" href="https://www.googletagmanager.com" />
  <link href="css/bootstrap.min.css?v=1782242490" rel="stylesheet" />

<link rel="preload" href="css/font-awesome.min.css?v=1782242490" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link href="css/font-awesome.min.css?v=1782242490" rel="stylesheet" /></noscript>
  <link href="css/style.min.css?v=1782242490" rel="stylesheet" />
<link rel="preload" href="css/whatsapp.min.css?v=1782242490" as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link href="css/whatsapp.min.css?v=1782242490" rel="stylesheet" /></noscript>
  <script src="js/lang-routes.min.js?v=1782242490" defer></script>
  <script src="js/lang-preference.min.js?v=1782242490" defer></script>
  <script>
    (function () {
      var routes = window.KINESICA_LANG_ROUTES;
      var pref =
        typeof window.kinesicaGetLangPreference === "function"
          ? window.kinesicaGetLangPreference()
          : null;
      var nav = (navigator.language || navigator.userLanguage || "").toLowerCase();
      var lang = "es";
      if (pref === "en" || pref === "fr" || pref === "pt" || pref === "es") {
        lang = pref;
      } else if (nav.indexOf("pt") === 0) {
        lang = "pt";
      } else if (nav.indexOf("fr") === 0) {
        lang = "fr";
      } else if (nav.indexOf("en") === 0) {
        lang = "en";
      }
      var target;
      if (routes && routes.isFileProtocol && routes.isFileProtocol()) {
        target =
          lang === "fr"
            ? "fr/404.html"
            : lang === "en"
              ? "en/404.html"
              : lang === "pt"
                ? "pt/404.html"
                : "404.html";
      } else {
        target =
          lang === "fr"
            ? "/fr/404.html"
            : lang === "en"
              ? "/en/404.html"
              : lang === "pt"
                ? "/pt/404.html"
                : "/404.html";
      }
      window.location.replace(target);
    })();
  </script>
</head>
