  <noscript><link href="css/font-awesome.min.css" rel="stylesheet" /></noscript>

<link rel="preload" href="css/whatsapp.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />

  <script src="js/lang-routes.min.js" defer></script>
  <script src="js/lang-preference.min.js" defer></script>
  <script>
    (function () {
      var routes = window.KINESICA_LANG_ROUTES;
      var pref =
        typeof window.kinesicaGetLangPreference === "function"
          ? window.kinesicaGetLangPreference()
          : null;
      var nav = (navigator.language || navigator.userLanguage || "").toLowerCase();
      var lang = "es";
      if (pref === "en" || pref === "fr" || pref === "es") {
        lang = pref;
      } else if (nav.indexOf("fr") === 0) {
        lang = "fr";
      } else if (nav.indexOf("en") === 0) {
        lang = "en";
      }
      var target;
      if (routes && routes.isFileProtocol && routes.isFileProtocol()) {
        target =
          lang === "fr"
            ? "fr/404.html"
            : lang === "en"
              ? "en/404.html"
              : "404.html";
      } else {
        target =
          lang === "fr" ? "/fr/404.html" : lang === "en" ? "/en/404.html" : "/404.html";
      }
      window.location.replace(target);
    })();
  </script>
</head>
